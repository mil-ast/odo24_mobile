name: odo24_mobile
description: ODO24 Mobile
publish_to: 'none'

version: 4.1.1+22

environment:
  sdk: ^3.10.0
  flutter: ^3.38.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any
  flutter_bloc: ^9.1.1
  package_info_plus: ^10.2.0
  cronet_http: ^1.9.0
  shared_preferences: ^2.5.5
  flutter_svg: ^2.3.0
  http: ^1.6.0
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  test: ^1.25.9
  analyzer: ^12.1.0
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true
  assets:
    - assets/logo.svg
    - assets/logo_dark.svg
    - assets/logo_v2.svg
